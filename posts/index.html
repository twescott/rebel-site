<!DOCTYPE html>
<html lang="en">
<head>
  <base href="https://rebel-the-dog.com/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Posts &mdash; Rebel's Blog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['"Playfair Display"', 'Georgia', 'serif'],
            sans:  ['Inter', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="alternate" type="application/rss+xml" title="Rebel's Blog" href="feed.xml">
</head>
<body class="bg-sky-50 text-stone-900 font-sans antialiased">

  <nav class="bg-[#1e3a5f] sticky top-0 z-50 shadow-lg">
    <div class="max-w-5xl mx-auto px-5 h-14 flex items-center justify-between gap-4">
      <a href="" class="font-serif text-lg font-bold text-white hover:text-amber-200 transition-colors shrink-0">Rebel's Blog</a>
      <div class="flex items-center gap-1 sm:gap-2 text-xs sm:text-sm font-medium">
        <a href="" class="px-2 sm:px-3 py-1.5 rounded-md transition-colors text-sky-200 hover:text-white hover:bg-[#162d4a]">Home</a>
        <a href="posts/" class="px-2 sm:px-3 py-1.5 rounded-md transition-colors text-white bg-[#0f2035]">Posts</a>
        <a href="puzzles.html" class="px-2 sm:px-3 py-1.5 rounded-md transition-colors text-sky-200 hover:text-white hover:bg-[#162d4a]">Puzzles</a>
        <a href="about.html" class="hidden sm:block px-2 sm:px-3 py-1.5 rounded-md transition-colors text-sky-200 hover:text-white hover:bg-[#162d4a]">About</a>
        <a href="feed.xml" class="px-2 py-1.5 text-sky-300 hover:text-orange-400 transition-colors" title="RSS Feed">
          <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><circle cx="5" cy="19" r="3"/><path d="M4 4a16 16 0 0 1 16 16h-3A13 13 0 0 0 4 7V4z"/><path d="M4 11a9 9 0 0 1 9 9H10a6 6 0 0 0-6-6v-3z"/></svg>
        </a>
      </div>
    </div>
  </nav>

  <div class="bg-[#1e3a5f] py-12 px-5">
    <div class="max-w-5xl mx-auto">
      <p class="text-sky-300 text-xs tracking-[0.15em] uppercase mb-2 font-medium">Rebel's Blog</p>
      <h1 class="font-serif text-4xl sm:text-5xl font-bold text-white">All Posts</h1>
      <p class="font-serif italic text-sky-200 mt-2">Big Puppy Energy</p>
    </div>
  </div>

  <main class="max-w-3xl mx-auto px-5 py-12">
    <div id="posts-list">
      <p class="text-stone-400 italic text-sm">Loading...</p>
    </div>
  </main>

  <footer class="bg-[#1e3a5f] mt-20">
    <div class="max-w-5xl mx-auto px-5 py-8 flex flex-col sm:flex-row items-center justify-between gap-3">
      <span class="font-serif text-sky-200 text-sm">&copy; 2026 Rebel's Blog</span>
      <div class="flex items-center gap-4 text-sm">
        <a href="feed.xml" class="text-sky-300 hover:text-stone-300 transition-colors">RSS Feed</a>
        <a href="about.html" class="text-sky-300 hover:text-stone-300 transition-colors">About</a>
      </div>
    </div>
  </footer>

  <script>
    fetch('_data/posts.json')
      .then(r => r.ok ? r.json() : [])
      .then(posts => {
        const el = document.getElementById('posts-list');
        if (!posts.length) {
          el.innerHTML = '<div class="rounded-xl border-2 border-dashed border-sky-200 bg-sky-100 p-10 text-center text-sky-400 font-sans text-sm italic">No posts yet &mdash; check back soon!</div>';
          return;
        }
        el.innerHTML = posts.map(post => {
          const date = post.date
            ? new Date(post.date + 'T12:00:00').toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })
            : '';
          const meta = [date, post.author ? 'By ' + esc(post.author) : ''].filter(Boolean).join(' &middot; ');
          return `
            <article class="border-b border-stone-200 py-6 last:border-0">
              <a href="posts/post.html?p=${esc(post.slug)}" class="group block mb-1">
                <h2 class="font-serif text-2xl font-bold text-[#1e3a5f] group-hover:underline leading-snug">${esc(post.title)}</h2>
              </a>
              ${meta ? `<p class="text-stone-500 text-sm mb-2">${meta}</p>` : ''}
              ${post.excerpt ? `<p class="text-stone-600 text-sm leading-relaxed">${esc(post.excerpt)}</p>` : ''}
            </article>`;
        }).join('');
      })
      .catch(() => {
        document.getElementById('posts-list').innerHTML =
          '<div class="rounded-xl border-2 border-dashed border-sky-200 bg-sky-100 p-10 text-center text-sky-400 font-sans text-sm italic">No posts yet &mdash; check back soon!</div>';
      });

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
