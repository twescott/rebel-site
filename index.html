      <a href="" class="font-serif text-lg font-bold text-white hover:text-amber-200 transition-colors shrink-0">Rebel the Dog</a>
      <div class="flex items-center gap-1 sm:gap-2 text-xs sm:text-sm font-medium">
        <a href="" class="px-2 sm:px-3 py-1.5 rounded-md transition-colors text-white bg-[#0f2035]">Home</a>
        <a href="posts/" class="px-2 sm:px-3 py-1.5 rounded-md transition-colors text-sky-200 hover:text-white hover:bg-[#162d4a]">Posts</a>
        <a href="puzzles.html" class="px-2 sm:px-3 py-1.5 rounded-md transition-colors text-sky-200 hover:text-white hover:bg-[#162d4a]">Puzzles</a>

  <!-- Hero -->
  <div class="bg-[#1e3a5f] hero-bg hero-grid relative overflow-hidden py-16 px-5">
    <div class="relative max-w-5xl mx-auto flex flex-col-reverse sm:flex-row items-center gap-10 sm:gap-16">

        <div class="rounded-xl border-2 border-dashed border-sky-200 bg-sky-100 p-8 flex items-center justify-center text-sky-200 font-sans text-sm italic col-span-full min-h-[120px]">

      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">

      <div class="flex items-center gap-4 text-sm">
        <a href="feed.xml" class="text-sky-300 hover:text-stone-300 transition-colors">RSS Feed</a>
        <a href="about.html" class="text-sky-300 hover:text-stone-300 transition-colors">About</a>
